
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vale 111: Colônia Verde</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   VALE 111: COLÔNIA VERDE
   Farming sim pós-nuclear — Stardew Valley x Fallout
   ═══════════════════════════════════════════════════════════ */
:root{
  /* ── Pip-Boy / HUD ── */
  --pip-green:#5fff8a;
  --pip-green-dim:#1f6b38;
  --pip-amber:#ffb000;
  --rad-yellow:#e8d000;

  /* ── Terra & solo (tons quentes de terra) ── */
  --soil:#6b5238;
  --soil-dark:#3e2e1c;
  --soil-light:#8a6c48;
  --soil-tilled:#5a4228;
  --soil-wet:#3a2c18;

  /* ── Vegetação / grama ── */
  --grass:#5a9456;
  --grass-dark:#3c6b3e;
  --grass-light:#7ab863;
  --crop-green:#6fae4a;
  --crop-green-dark:#3f7a2e;

  /* ── Céu: dia / entardecer / noite / chuva ── */
  --sky-day:#a8d4dc;
  --sky-day2:#dff0d8;
  --sky-dusk:#e89a6c;
  --sky-dusk2:#7a4a5a;
  --sky-night:#1a2440;
  --sky-night2:#0c1224;
  --sky-rain:#5a6a78;
  --sky-rain2:#3a4854;

  /* ── Madeira & pedra (painéis) ── */
  --wood:#9a7148;
  --wood-dark:#5e4326;
  --wood-light:#b88f5e;
  --stone:#6a6a64;
  --stone-dark:#3a3a36;
  --rust:#a85a32;

  /* ── Painéis / UI base ── */
  --panel:#22281f;
  --panel2:#2c3424;
  --panel-light:#3a4530;
  --border:#4a5a3a;
  --border-bright:#5fff8a;
  --border-dark:#161c12;

  /* ── Texto ── */
  --text:#dce8d0;
  --text-dim:#8a9a78;
  --text-bright:#f4ffec;

  /* ── Iluminação / fogo / tocha ── */
  --torch-glow:#ffaa44;
  --torch-core:#ffe08a;
  --water-shine:#bdf0ff;

  --font-pixel:'Press Start 2P',monospace;
  --font-term:'VT323',monospace;
  --font-mono:'Share Tech Mono',monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent;image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--soil-dark);color:var(--text);font-family:var(--font-term);font-size:16px;}
button{background:none;border:none;cursor:pointer;font-family:inherit;color:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:#0a0c08;}
::-webkit-scrollbar-thumb{background:var(--pip-green-dim);border:2px solid #0a0c08;}

/* ── PIXEL BORDER: 4-corner notch using clip-path, gives a chunky retro panel edge ── */
.pixel-frame{
  position:relative;
  border:3px solid var(--border);
  box-shadow:
    inset 0 0 0 2px #000,
    0 4px 0 0 rgba(0,0,0,.5);
  image-rendering:pixelated;
}
.pixel-frame::before{
  content:'';
  position:absolute; inset:-3px;
  pointer-events:none;
  background:
    linear-gradient(135deg, var(--border) 0 6px, transparent 6px) top left / 50% 50% no-repeat,
    linear-gradient(225deg, var(--border) 0 6px, transparent 6px) top right / 50% 50% no-repeat,
    linear-gradient(45deg, var(--border) 0 6px, transparent 6px) bottom left / 50% 50% no-repeat,
    linear-gradient(315deg, var(--border) 0 6px, transparent 6px) bottom right / 50% 50% no-repeat;
  opacity:.6;
}

/* Pixel button: chunky 3D press effect like NES UI */
.pixel-btn{
  position:relative;
  border:none;
  box-shadow:
    inset -3px -3px 0 0 rgba(0,0,0,.35),
    inset 3px 3px 0 0 rgba(255,255,255,.12);
  transition:transform .08s, box-shadow .08s, filter .12s;
}
.pixel-btn:active:not(:disabled){
  transform:translateY(2px);
  box-shadow:inset 2px 2px 0 0 rgba(0,0,0,.4);
}
.pixel-btn:hover:not(:disabled){ filter:brightness(1.18); }

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes growPlant{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-30px);opacity:0}}
@keyframes scanline{0%{background-position:0 0}100%{background-position:0 4px}}
@keyframes geigerFlash{0%,100%{box-shadow:inset 0 0 0 rgba(232,208,0,0)}50%{box-shadow:inset 0 0 60px rgba(232,208,0,.25)}}
@keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
@keyframes pixelPop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

/* ═══ LOADING ═══ */
#loading-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--soil-dark);
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,.25) 0 2px, transparent 2px 4px),
    repeating-linear-gradient(90deg, rgba(0,0,0,.25) 0 2px, transparent 2px 4px);
  background-size:32px 32px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity 1.2s ease;
}
#loading-screen.fade-out{opacity:0;pointer-events:none;}
.load-logo{font-family:var(--font-pixel);font-size:18px;color:var(--pip-green);text-shadow:3px 3px 0 #000,0 0 12px var(--pip-green);letter-spacing:4px;text-align:center;line-height:2;animation:pulse 1.8s ease-in-out infinite;}
.load-sub{font-family:var(--font-term);font-size:14px;color:var(--text-dim);letter-spacing:2px;}
.load-bar{width:240px;height:14px;background:#0a0c08;border:3px solid var(--pip-green-dim);position:relative;overflow:hidden;box-shadow:0 4px 0 0 rgba(0,0,0,.5);}
.load-fill{height:100%;background:repeating-linear-gradient(90deg, var(--pip-green) 0 6px, var(--pip-green-dim) 6px 12px);width:0%;animation:loadfill 1.7s steps(20) forwards;box-shadow:0 0 8px var(--pip-green);}
@keyframes loadfill{to{width:100%}}

/* ═══ SCANLINE OVERLAY ═══ */
#scanlines{position:fixed;inset:0;z-index:9000;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,20,5,.06) 3px,rgba(0,0,0,0) 4px);
  mix-blend-mode:overlay;opacity:.5;
}

/* ═══ ROOT LAYOUT ═══ */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}

/* TOPBAR */
#topbar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 14px;background:var(--panel2);
  border-bottom:4px solid var(--border);
  box-shadow:0 4px 0 0 #000;
  z-index:10;
}
.tb-group{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.tb-item{display:flex;flex-direction:column;align-items:flex-start;gap:1px;background:#0a0c08;border:2px solid var(--border);padding:2px 6px;box-shadow:inset 0 0 0 1px #000;}
.tb-label{font-family:var(--font-pixel);font-size:7px;color:var(--text-dim);letter-spacing:1px;}
.tb-value{font-family:var(--font-term);font-size:17px;color:var(--pip-green);text-shadow:1px 1px 0 #000,0 0 4px rgba(95,255,138,.5);}
.tb-value.amber{color:var(--pip-amber);text-shadow:1px 1px 0 #000,0 0 4px rgba(255,176,0,.5);}
.tb-value.rad{color:var(--rad-yellow);}
#daynight-icon{font-size:18px;}
.title-bit{font-family:var(--font-pixel);font-size:10px;color:var(--pip-amber);letter-spacing:2px;text-shadow:2px 2px 0 #000;}

/* MAIN AREA */
#main{flex:1;display:flex;overflow:hidden;position:relative;}

/* ═══════════════════════════════════════════════════
   FARM VIEW — céu, clima, estações, iluminação
   ═══════════════════════════════════════════════════ */
#farm-view{flex:1;position:relative;overflow:auto;background:var(--soil-dark);}

#farm-bg{
  position:absolute;inset:0;overflow:hidden;
  background:linear-gradient(180deg, var(--sky-day) 0%, var(--sky-day2) 26%, var(--grass) 26%, var(--grass-dark) 32%, var(--soil) 32%, var(--soil-dark) 100%);
  transition:background 1.8s ease;
  image-rendering:pixelated;
}
/* dithering / scanline texture sobre o céu e o solo */
#farm-bg::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:3;
  background-image:repeating-linear-gradient(0deg, rgba(0,0,0,.06) 0 3px, transparent 3px 6px);
  mix-blend-mode:multiply;
}
/* "sol/lua" pixelado fixo no céu */
#farm-bg::before{
  content:'';position:absolute;top:6%;left:12%;width:46px;height:46px;
  background:var(--torch-core);
  box-shadow:0 0 0 6px rgba(255,224,138,.18), 0 0 24px 10px rgba(255,224,138,.25);
  clip-path:polygon(30% 0,70% 0,100% 30%,100% 70%,70% 100%,30% 100%,0 70%,0 30%);
  transition:background 1.5s ease, box-shadow 1.5s ease, top 1.5s ease, opacity 1.5s ease;
  z-index:1;
}

/* ── ENTARDECER ── */
#farm-bg.dusk{background:linear-gradient(180deg, var(--sky-dusk) 0%, var(--sky-dusk2) 26%, var(--grass-dark) 26%, var(--grass-dark) 32%, var(--soil) 32%, var(--soil-dark) 100%);}
#farm-bg.dusk::before{background:var(--torch-glow);top:14%;left:62%;box-shadow:0 0 0 8px rgba(255,170,68,.25),0 0 30px 12px rgba(255,120,60,.35);}

/* ── NOITE ── */
#farm-bg.night{background:linear-gradient(180deg, var(--sky-night) 0%, var(--sky-night2) 26%, #1c2a1c 26%, var(--grass-dark) 32%, var(--soil-dark) 32%, #1a120a 100%);}
#farm-bg.night::before{
  background:#dfe6f0;width:30px;height:30px;top:8%;left:75%;
  box-shadow:0 0 0 5px rgba(220,230,255,.12),0 0 18px 8px rgba(180,200,255,.18);
  clip-path:circle(50%);
}
/* luz quente de "janelas/tochas" da colônia, visível só de noite */
#farm-bg.night::after{
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,.06) 0 3px, transparent 3px 6px),
    radial-gradient(circle at 18% 33%, rgba(255,170,68,.35) 0 3%, transparent 9%),
    radial-gradient(circle at 82% 35%, rgba(255,170,68,.30) 0 3%, transparent 9%),
    radial-gradient(circle at 50% 31%, rgba(255,170,68,.25) 0 2.5%, transparent 8%);
  animation:torchFlicker 2.4s ease-in-out infinite;
}
@keyframes torchFlicker{
  0%,100%{opacity:1;}
  45%{opacity:.85;}
  55%{opacity:1;}
  78%{opacity:.9;}
}

/* ── CHUVA (classe opcional 'rain', preparada para uso futuro sem quebrar nada) ── */
#farm-bg.rain{background:linear-gradient(180deg, var(--sky-rain) 0%, var(--sky-rain2) 26%, var(--grass-dark) 26%, var(--grass-dark) 32%, var(--soil-wet) 32%, var(--soil-dark) 100%);}
#farm-bg.rain::before{opacity:.2;}
#farm-bg.rain .rain-layer{display:block;}
.rain-layer{
  display:none;position:absolute;inset:0;z-index:4;pointer-events:none;
  background-image:repeating-linear-gradient(115deg, rgba(180,220,255,.18) 0 2px, transparent 2px 22px);
  animation:rainFall .35s linear infinite;
}
@keyframes rainFall{from{background-position:0 0;}to{background-position:-40px 60px;}}

/* ── GRAMA ANIMADA AO VENTO ── */
.grass-band{
  position:absolute;left:0;right:0;top:26%;height:6%;z-index:2;pointer-events:none;
  background-image:repeating-linear-gradient(90deg,
    var(--grass-light) 0 4px, var(--grass) 4px 8px, var(--grass-dark) 8px 10px);
  clip-path:polygon(0% 40%,2% 0%,5% 45%,8% 5%,11% 50%,14% 10%,17% 45%,20% 0%,23% 48%,26% 8%,29% 42%,32% 5%,35% 50%,38% 12%,41% 45%,44% 0%,47% 48%,50% 8%,53% 42%,56% 5%,59% 50%,62% 12%,65% 45%,68% 2%,71% 48%,74% 8%,77% 42%,80% 5%,83% 50%,86% 10%,89% 45%,92% 0%,95% 48%,98% 8%,100% 40%,100% 100%,0% 100%);
  animation:windSway 3.2s ease-in-out infinite alternate;
  transform-origin:bottom center;
}
@keyframes windSway{
  0%{transform:scaleX(1) skewX(0deg);}
  50%{transform:scaleX(1.01) skewX(.6deg);}
  100%{transform:scaleX(1) skewX(-.6deg);}
}
#farm-bg.night .grass-band{filter:brightness(.55);}
#farm-bg.dusk .grass-band{filter:brightness(.8) saturate(1.1);}

/* ── PARTÍCULAS: folhas e poeira flutuantes ── */
.ambient-particles{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden;}
.leaf-particle{
  position:absolute;font-size:10px;opacity:.55;
  animation:leafDrift linear infinite;
  filter:drop-shadow(1px 1px 0 rgba(0,0,0,.4));
}
@keyframes leafDrift{
  0%{transform:translate(0,-10vh) rotate(0deg);opacity:0;}
  10%{opacity:.6;}
  90%{opacity:.5;}
  100%{transform:translate(-60px,110vh) rotate(340deg);opacity:0;}
}
.leaf-particle:nth-child(1){left:8%; animation-duration:18s; animation-delay:0s;}
.leaf-particle:nth-child(2){left:28%;animation-duration:24s; animation-delay:4s;}
.leaf-particle:nth-child(3){left:52%;animation-duration:20s; animation-delay:9s;}
.leaf-particle:nth-child(4){left:71%;animation-duration:26s; animation-delay:2s;}
.leaf-particle:nth-child(5){left:88%;animation-duration:22s; animation-delay:13s;}
.leaf-particle:nth-child(6){left:40%;animation-duration:30s; animation-delay:6s;}

/* ═══════════════════════════════════════════════════
   GRID DA FAZENDA
   ═══════════════════════════════════════════════════ */
#farm-grid{
  position:relative;z-index:5;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:4px;
  padding:18px;
  max-width:640px;margin:34vh auto 0;
  background:
    repeating-linear-gradient(45deg, rgba(0,0,0,.10) 0 4px, transparent 4px 8px),
    rgba(0,0,0,.18);
  border:4px solid var(--soil-dark);
  box-shadow:inset 0 0 0 2px rgba(0,0,0,.4), 0 6px 0 0 rgba(0,0,0,.35);
}
.plot{
  aspect-ratio:1;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.05) 0 2px, transparent 3px),
    radial-gradient(circle at 70% 65%, rgba(0,0,0,.12) 0 2px, transparent 3px),
    var(--soil);
  border:2px solid var(--soil-dark);
  box-shadow:inset -2px -2px 0 0 rgba(0,0,0,.3), inset 2px 2px 0 0 rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;position:relative;
  font-size:20px;cursor:pointer;transition:filter .1s,transform .08s,box-shadow .1s;
}
.plot:hover{filter:brightness(1.3);transform:scale(1.06);z-index:2;box-shadow:0 0 0 2px var(--pip-green), inset -2px -2px 0 0 rgba(0,0,0,.25);}
.plot.tilled{
  background:
    repeating-linear-gradient(90deg, rgba(0,0,0,.1) 0 3px, transparent 3px 9px),
    var(--soil-tilled);
}
.plot.watered{
  background:
    linear-gradient(180deg, rgba(189,240,255,.18), transparent 60%),
    repeating-linear-gradient(90deg, rgba(0,0,0,.12) 0 3px, transparent 3px 9px),
    var(--soil-wet);
  box-shadow:inset 0 0 0 2px rgba(189,240,255,.3), inset -2px -2px 0 0 rgba(0,0,0,.25);
}
.plot.watered::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(115deg, transparent 35%, rgba(255,255,255,.22) 48%, transparent 60%);
  background-size:220% 220%;
  animation:waterShine 2.6s linear infinite;
}
@keyframes waterShine{
  0%{background-position:120% 0%;}
  100%{background-position:-20% 100%;}
}
.plot.locked{background:#15110c;color:var(--text-dim);cursor:not-allowed;font-size:13px;box-shadow:inset 0 0 0 2px #000;}
.plot .ready-badge{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--pip-green);box-shadow:0 0 6px var(--pip-green),0 0 0 1px #000;animation:pulse 1s infinite;}
.plot .growth-bar{position:absolute;bottom:2px;left:2px;right:2px;height:4px;background:#000;overflow:hidden;border:1px solid #000;}
.plot .growth-bar-fill{height:100%;background:var(--crop-green);background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.25) 0 2px, transparent 2px 4px);}
.plant-emoji{display:inline-block;animation:growPlant .4s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(1px 1px 0 rgba(0,0,0,.5));}
@keyframes growPlant{
  0%{transform:scale(.2) translateY(6px);opacity:0;}
  60%{transform:scale(1.15) translateY(-2px);opacity:1;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}
.float-text{position:absolute;font-family:var(--font-pixel);font-size:9px;color:var(--pip-green);pointer-events:none;animation:floatUp 1s ease-out forwards;white-space:nowrap;z-index:50;text-shadow:1px 1px 0 #000,-1px -1px 0 #000;}

/* RAD STORM overlay */
#radstorm-overlay{position:fixed;inset:0;z-index:8500;pointer-events:none;display:none;}
#radstorm-overlay.active{display:block;animation:geigerFlash 1.4s infinite;background:linear-gradient(180deg,rgba(232,208,0,.05),rgba(95,255,138,.03));}

/* SIDE PANEL */
#sidepanel{
  width:280px;min-width:280px;background:var(--panel);border-left:4px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:-4px 0 0 0 #000;
}
#sp-tabs{display:flex;flex-wrap:wrap;border-bottom:3px solid var(--border);background:#0a0c08;}
.sp-tab{flex:1 1 33%;padding:8px 4px;font-family:var(--font-pixel);font-size:8px;letter-spacing:1px;color:var(--text-dim);border:2px solid transparent;border-bottom:3px solid var(--border);transition:.1s;}
.sp-tab.active{color:var(--pip-green);border-bottom-color:var(--pip-green);background:var(--panel2);text-shadow:1px 1px 0 #000;box-shadow:inset 0 3px 0 0 rgba(95,255,138,.15);}
.sp-tab:hover:not(.active){color:var(--text-bright);background:var(--panel2);}
#sp-content{flex:1;overflow-y:auto;padding:10px;}

.sp-section-title{font-family:var(--font-pixel);font-size:8px;letter-spacing:2px;color:var(--pip-amber);margin:10px 0 6px;text-shadow:1px 1px 0 #000;border-bottom:2px solid var(--border);padding-bottom:4px;}
.sp-card{background:var(--panel2);border:2px solid var(--border);box-shadow:inset 0 0 0 1px #000,2px 2px 0 0 rgba(0,0,0,.4);padding:8px;margin-bottom:6px;font-size:13px;}
.sp-card.active-quest{border-color:var(--pip-green);box-shadow:inset 0 0 0 1px #000,0 0 0 1px var(--pip-green),2px 2px 0 0 rgba(0,0,0,.4);}
.sp-row{display:flex;justify-content:space-between;align-items:center;gap:6px;}
.sp-btn{
  font-family:var(--font-pixel);font-size:8px;letter-spacing:1px;
  background:var(--pip-green-dim);color:var(--pip-green);border:2px solid var(--pip-green);
  padding:7px 8px;text-align:center;
  box-shadow:inset -2px -2px 0 0 rgba(0,0,0,.35), inset 2px 2px 0 0 rgba(255,255,255,.1), 2px 2px 0 0 rgba(0,0,0,.4);
  transition:transform .08s, filter .1s;
}
.sp-btn:hover:not(:disabled){background:var(--pip-green);color:#08130a;filter:brightness(1.1);}
.sp-btn:active:not(:disabled){transform:translate(1px,1px);box-shadow:inset 1px 1px 0 0 rgba(0,0,0,.4);}
.sp-btn:disabled{opacity:.35;cursor:not-allowed;}
.sp-btn.danger{background:#5a1f1f;color:#ff8a8a;border-color:#ff5555;}
.sp-btn.danger:hover{background:#ff5555;color:#1a0606;}
.sp-btn.amber{background:#5a3c00;color:var(--pip-amber);border-color:var(--pip-amber);}
.sp-btn.amber:hover{background:var(--pip-amber);color:#1a0e00;}

/* HOTBAR */
#hotbar{
  display:flex;gap:6px;justify-content:center;padding:8px;
  background:var(--panel2);border-top:4px solid var(--border);
  box-shadow:0 -4px 0 0 #000;
}
.hot-slot{
  width:48px;height:48px;background:var(--panel);border:3px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:20px;position:relative;transition:.1s;
  box-shadow:inset -2px -2px 0 0 rgba(0,0,0,.4), inset 2px 2px 0 0 rgba(255,255,255,.08);
}
.hot-slot.active{border-color:var(--pip-green);box-shadow:0 0 0 2px var(--pip-green),inset -2px -2px 0 0 rgba(0,0,0,.4);background:#1a2818;}
.hot-slot .qty{position:absolute;bottom:1px;right:3px;font-family:var(--font-mono);font-size:9px;color:var(--pip-amber);text-shadow:1px 1px 0 #000;}
.hot-slot .key{position:absolute;top:1px;left:3px;font-size:7px;color:var(--text-dim);font-family:var(--font-mono);}

/* MODALS */
.modal-overlay{
  position:fixed;inset:0;z-index:8000;background:rgba(8,12,8,.85);
  display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;
}
.modal-box{
  background:var(--panel);border:3px solid var(--pip-green-dim);
  box-shadow:inset 0 0 0 2px #000, 6px 6px 0 0 rgba(0,0,0,.5);

  const sk = state.skills[skillKey];

// Pontos de Legado: somam-se ao total para calcular Tier da colônia
function calcularPontosColonia(){
  let pts = 0;
  state.marcosCompletos.forEach(id=>{
    const m = MILESTONES.find(x=>x.id===id);
    if (m) pts += m.pontos;
  });
  pts += Object.keys(state.tecnologias).length; // cada tech vale +1 extra
  return pts;
}

function getColonyTier(){
  const pts = calcularPontosColonia();
  let tier = COLONY_TIERS[0];
  for (const t of COLONY_TIERS){ if (pts >= t.minPontos) tier = t; }
  return tier;
}

function toast(msg, warn=false){
  const stack = document.getElementById('toast-stack');
  const t = document.createElement('div');
  t.className = 'toast' + (warn?' warn':'');
  t.textContent = msg;
  stack.appendChild(t);
  setTimeout(()=>{ t.classList.add('fade'); setTimeout(()=>t.remove(),400); }, 2600);
}

function floatText(plotEl, text){
  const f = document.createElement('div');
  f.className='float-text';
  f.textContent = text;
  f.style.left = '50%'; f.style.top='30%'; f.style.transform='translateX(-50%)';
  plotEl.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}

function fmtTime(h){
  const hh = Math.floor(h)%24;
  const mm = Math.floor((h%1)*60);
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}

// ─────────────────────────────────────────────────────────────
// PLOT INTERACTION
// ─────────────────────────────────────────────────────────────
function spendEnergy(amount){
  if (state.energia < amount){ toast('Energia insuficiente! Descanse no Abrigo.', true); return false; }
  state.energia = Math.max(0, state.energia - amount);
  return true;
}

function handlePlotClick(p, el){
  if (p.locked){ toast('Parcela bloqueada. Compre uma Carta de Expansão.', true); return; }
  let energiaMult = BUILDINGS.oficina.bonusEnergiaFerramenta[state.buildings.oficina-1];
  if (state.tecnologias['tech_coletor_solar']) energiaMult *= 0.85;
  if (state.colonosEspecialistas.some(c=>c.tipo==='engenheiro')) energiaMult *= 0.9;

  switch(state.toolAtivo){
    case 'enxada':
      if (p.tilled){ toast('Já está arado.'); return; }
      if (!spendEnergy(Math.ceil(3*energiaMult))) return;
      p.tilled = true;
      floatText(el,'+arado');
      break;

    case 'rega':
      if (!p.tilled){ toast('Are a terra primeiro.'); return; }
      if (p.watered){ toast('Já está regado.'); return; }
      if (!spendEnergy(Math.ceil(2*energiaMult))) return;
      p.watered = true;
      floatText(el,'💧');
      break;

    case 'plantar': {
      if (!p.tilled){ toast('Are a terra primeiro.'); return; }
      if (p.crop){ toast('Já há um cultivo aqui.'); return; }
      const sementeKey = getSelectedSeed();
      if (!sementeKey){ toast('Você não tem sementes. Visite o Empório.', true); return; }
      if (!spendEnergy(Math.ceil(2*energiaMult))) return;
      p.crop = sementeKey; p.growth = 0; p.ready=false; p.fertilizado = !!state.toolFertilizar;
      state.inventario.sementes[sementeKey]--;
      if (state.inventario.sementes[sementeKey]<=0) delete state.inventario.sementes[sementeKey];
      if (state.toolFertilizar){
        if ((state.inventario.fertilizante||0)>0) state.inventario.fertilizante--;
        else p.fertilizado=false;
      }
      floatText(el,'🌱 plantado');
      renderHotbar();
      break;
    }

    case 'fertilizar':
      if (!p.tilled || !p.crop){ toast('Plante algo primeiro.'); return; }
      if (p.fertilizado){ toast('Já fertilizado.'); return; }
      if (!(state.inventario.fertilizante>0)){ toast('Sem fertilizante. Compre no Empório.', true); return; }
      state.inventario.fertilizante--;
      p.fertilizado = true;
      floatText(el,'🧪 fertilizado');
      break;

    case 'colher':
      if (!p.crop){ toast('Nada para colher aqui.'); return; }
      if (!p.ready){ toast('Ainda não está maduro.'); return; }
      if (!spendEnergy(1)) return;
      {
        const c = CROPS[p.crop];
        // quality roll, boosted by agricultura skill and fertilizante
        const agriLvl = state.skills.agricultura.nivel;
        let qtd = 1;
        let qualidade = 'Normal';
        const fertBonus = (p.fertilizado ? (state.tecnologias['tech_fertilizante_avancado']?0.40:0.20) : 0);
        const agricultorBonus = state.colonosEspecialistas.some(c=>c.tipo==='agricultor') ? 0.05 : 0;
        const rollAlta = 0.10 + agriLvl*0.05 + fertBonus + agricultorBonus;
        let rollMutante = agriLvl>=5 ? 0.08 : 0;
        if (p.fertilizado && state.tecnologias['tech_fertilizante_avancado']) rollMutante += 0.05;
        const roll = Math.random();
        if (roll < rollMutante){ qualidade='Mutante'; qtd=2; }
        else if (roll < rollMutante+rollAlta){ qualidade='Alta'; }
        state.inventario.colheitas[p.crop] = (state.inventario.colheitas[p.crop]||0)+qtd;
        if (qualidade!=='Normal'){
          state.inventario.qualidades = state.inventario.qualidades||{};
          state.inventario.qualidades[p.crop] = state.inventario.qualidades[p.crop]||{};
          state.inventario.qualidades[p.crop][qualidade] = (state.inventario.qualidades[p.crop][qualidade]||0)+qtd;
        }
        floatText(el,'+'+qtd+' '+c.emoji+(qualidade!=='Normal'?' ★'+qualidade:''));
        state.colheitasFeitas++;
        ganharXP('agricultura', 8 + (qualidade==='Alta'?4:0) + (qualidade==='Mutante'?10:0));
        updateQuestProgress('colher', state.colheitasFeitas);
        p.crop=null; p.growth=0; p.ready=false; p.tilled=true; p.watered=false; p.fertilizado=false;
      }
      break;
  }
  renderFarm();
  renderTopbar();
}

function getSelectedSeed(){
  const keys = Object.keys(state.inventario.sementes).filter(k=>state.inventario.sementes[k]>0);
  if (!keys.length) return null;
  // pick currently selected hotbar seed, else first
  if (state.selectedSeed && state.inventario.sementes[state.selectedSeed]>0) return state.selectedSeed;
  return keys[0];
}

    slot.innerHTML = `<span>${c.plantEmoji}</span><span class="qty">${state.inventario.sementes[k]}</span>`;

    slot.addEventListener('click',()=>{ state.selectedSeed=k; state.toolAtivo='plantar'; renderHotbar(); });
    bar.appendChild(slot);
  });
}

function updateQuestProgress(meta, val){
  state.quests.forEach(q=>{
    if (q.meta===meta && q.ativa && !q.completa){
      q.progresso = val;
      if (val >= q.alvo){
        q.completa = true;
        grantReward(q.recompensa);
        toast('✅ Missão concluída: '+q.titulo);
        activateNextQuest();
      }
    }
  });
  renderSidepanel();
}

function activateNextQuest(){
  const order = ['q1','q2','q3','q4','q5'];
  for (let id of order){
    const q = state.quests.find(x=>x.id===id);
    if (!q.ativa && !q.completa){ q.ativa=true; toast('📜 Nova missão: '+q.titulo); break; }
  }
}

function grantReward(r){
  if (r.caps){ state.caps += r.caps; toast('+'+r.caps+' tampinhas 🧢'); }
  if (r.energia){ state.energia = Math.min(state.energiaMax, state.energia+r.energia); }
  if (r.energiaMax){ state.energiaMax += r.energiaMax; }
  if (r.sementes){
    Object.keys(CROPS).slice(0,1).forEach(k=>{
      state.inventario.sementes[k]=(state.inventario.sementes[k]||0)+r.sementes;
    });
  }
}

function renderSidepanel(){
  document.querySelectorAll('.sp-tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===activeTab));
  const c = document.getElementById('sp-content');
  if (activeTab==='missoes') c.innerHTML = renderMissoes();
  else if (activeTab==='colonos') c.innerHTML = renderColonos();
  else if (activeTab==='loja') c.innerHTML = renderLoja();
  else if (activeTab==='abrigo') c.innerHTML = renderAbrigo();
  else if (activeTab==='animais') c.innerHTML = renderAnimais();
  else if (activeTab==='construcoes') c.innerHTML = renderConstrucoes();

  if (!ativas.length) h += '<div class="sp-card">Nenhuma missão ativa.</div>';

function renderLoja(){

  SHOP_ITEMS.forEach(item=>{
    let disabled = state.caps < item.preco;
    if (item.tipo==='expansao' && state.parcelasDesbloqueadas>=TOTAL_PLOTS) disabled=true;
    h += `<div class="sp-card sp-row">
      <span>${item.emoji} ${item.nome}</span>
      <button class="sp-btn" data-buy="${item.id}" ${disabled?'disabled':''}>${item.preco} 🧢</button>
    </div>`;
  });
  h += '<div class="sp-section-title">SUAS COLHEITAS (VENDER)</div>';

  if (!colheitaKeys.length) h += '<div class="sp-card" style="color:var(--text-dim);">Nada para vender ainda.</div>';
  colheitaKeys.forEach(k=>{
    const c = CROPS[k];
    const quals = state.inventario.qualidades?.[k]||{};
    const totalQual = Object.values(quals).reduce((a,b)=>a+b,0);
    const normalQty = state.inventario.colheitas[k]-totalQual;
    if (normalQty>0){
      h += `<div class="sp-card sp-row">

    Object.entries(quals).forEach(([qual,qty])=>{

        <span>${c.emoji} ${c.nome} ★${qual} ×${qty}</span>
        <button class="sp-btn amber" data-sell="${k}" data-qual="${qual}">Vender por ${Math.round(c.venda*mult)} 🧢</button>

      <button class="sp-btn amber" data-sellanimal="${k}">Vender por ${info.venda} 🧢</button>

function feedAnimal(id){
  const a = state.animais.find(x=>x.id===id);
  if (!a || !(state.inventario.racao>0) || a.fome>=100) return;
  state.inventario.racao--;
  a.fome = Math.min(100, a.fome+50);
  a.felicidade = Math.min(100, a.felicidade+5);
  ganharXP('social',1);
  toast(a.nome+' foi alimentado(a) 🌾');
  renderSidepanel(); renderTopbar();
}

function collectAnimalProduct(id){
  const a = state.animais.find(x=>x.id===id);
  if (!a || !a.pronto) return;
  const t = ANIMAL_TYPES[a.tipo];
  state.produtosAnimais[a.tipo] = (state.produtosAnimais[a.tipo]||0)+1;
  a.pronto = false;
  a.diasDesdeProducao = 0;
  ganharXP('social',3);
  toast('Coletado: '+t.produtoEmoji+' '+t.produto);
  renderSidepanel();
}

function upgradeBuilding(key){
  const b = BUILDINGS[key];
  const lvl = state.buildings[key];
  if (lvl>b.maxLevel) return;
  const custo = b.custos[lvl];
  if (state.caps < custo) return;
  state.caps -= custo;
  state.buildings[key]++;
  if (key==='casa'){
    state.energiaMax += b.bonusEnergiaMax[lvl];
    state.energia = state.energiaMax;
  }
  toast(b.emoji+' '+b.nome+' evoluído para o nível '+state.buildings[key]+'!');
  renderTopbar(); renderSidepanel();
}


function renderColonia(){
  const tier = getColonyTier();
  const pts = calcularPontosColonia();
  const nextTier = COLONY_TIERS.find(t=>t.minPontos>tier.minPontos);

  let h = `<div class="colony-tier-banner">${tier.emoji} ${tier.nome}</div>`;
  h += `<div class="sp-card">
    <div style="font-size:12px;line-height:1.4;">${tier.desc}</div>
    <div style="margin-top:6px;font-size:11px;color:var(--text-dim);">Pontos de Legado: <strong style="color:var(--pip-amber);">${pts}</strong>${nextTier?' · Próximo nível: '+nextTier.minPontos+' pts ('+nextTier.emoji+' '+nextTier.nome+')':' · Nível máximo alcançado!'}</div>
    <div class="bar-outer" style="margin-top:4px;"><div class="bar-inner" style="width:${nextTier ? Math.min(100,((pts-tier.minPontos)/(nextTier.minPontos-tier.minPontos))*100) : 100}%;background:var(--pip-amber);"></div></div>
  </div>`;

  h += `<div class="sp-card sp-row"><span>🔬 Pontos de Pesquisa (PD)</span><strong style="color:var(--pip-green);">${state.pesquisaPD}</strong></div>`;

  // Tech tree
  h += '<div class="sp-section-title">ÁRVORE TECNOLÓGICA</div>';
  const categorias = ['Agricultura','Engenharia','Sociedade'];
  categorias.forEach(cat=>{
    h += `<div style="font-family:var(--font-pixel);font-size:8px;color:var(--text-dim);letter-spacing:2px;margin:6px 0 4px;">${cat.toUpperCase()}</div>`;
    TECH_TREE.filter(t=>t.categoria===cat).forEach(t=>{
      const unlocked = !!state.tecnologias[t.id];
      const reqMet = t.req.every(r=>state.tecnologias[r]);
      const available = !unlocked && reqMet && state.pesquisaPD>=t.custo;
      const cls = unlocked?'unlocked':(reqMet?'available':'locked');
      h += `<div class="tech-node ${cls}">
        <div class="tech-title"><span>${t.emoji} ${t.nome}</span><span class="tag-status" style="color:${unlocked?'var(--pip-green)':reqMet?'var(--pip-amber)':'var(--text-dim)'};">${unlocked?'✅ ATIVO':reqMet?'DISPONÍVEL':'🔒 BLOQUEADO'}</span></div>
        <div class="tech-desc">${t.desc}</div>
        ${t.req.length?`<div class="tech-req">Requer: ${t.req.map(r=>TECH_TREE.find(x=>x.id===r).nome).join(', ')}</div>`:''}
        ${!unlocked?`<button class="sp-btn" data-tech="${t.id}" ${(!reqMet || state.pesquisaPD<t.custo)?'disabled':''}>Pesquisar (${t.custo} PD)</button>`:''}
      </div>`;
    });
  });

  // Colonos especialistas
  h += '<div class="sp-section-title">COLONOS ESPECIALISTAS</div>';
  if (!state.colonosEspecialistas.length) h += '<div class="sp-card" style="color:var(--text-dim);">Nenhum especialista ainda. A Torre de Rádio atrai novos rostos ao Vale.</div>';
  state.colonosEspecialistas.forEach(c=>{
    const info = COLONO_TIPOS.find(x=>x.tipo===c.tipo);
    h += `<div class="npc-card" style="cursor:default;">
      <div class="npc-emoji">${info.emoji}</div>
      <div class="npc-info">
        <div class="npc-name">${c.nome} · ${info.nome}</div>
        <div style="font-size:11px;color:var(--text-dim);">${info.bonus}</div>
      </div>
    </div>`;
  });

  // Rumo da colônia
  if (state.tecnologias['tech_conselho']){
    h += '<div class="sp-section-title">RUMO DA COLÔNIA</div>';
    if (state.rumoColonia){
      const rumos = {tecnologia:'⚙️ Tecnologia — foco em automação e pesquisa.', natureza:'🌿 Natureza — foco em harmonia com a terra mutante.', militar:'🛡️ Poder Militar — foco em defesa e segurança.'};
      h += `<div class="sp-card">Rumo escolhido: <strong style="color:var(--pip-green);">${rumos[state.rumoColonia]}</strong></div>`;
    } else {
      h += `<div class="sp-card">O Conselho do Vale aguarda sua decisão sobre o futuro da colônia. Esta escolha é permanente.</div>
      <button class="sp-btn" data-rumo="tecnologia" style="width:100%;margin-bottom:4px;">⚙️ Tecnologia (+1 PD/dia extra)</button>
      <button class="sp-btn" data-rumo="natureza" style="width:100%;margin-bottom:4px;">🌿 Natureza (+10% venda de colheitas)</button>
      <button class="sp-btn" data-rumo="militar" style="width:100%;margin-bottom:4px;">🛡️ Poder Militar (radiação não sobe durante tempestades)</button>`;
    }
  }

  // Marcos históricos
  h += '<div class="sp-section-title">MARCOS HISTÓRICOS DO VALE</div>';
  MILESTONES.forEach(m=>{
    const done = state.marcosCompletos.includes(m.id);
    h += `<div class="milestone-card ${done?'done':''}">
      <div class="milestone-title">${done?'✅':'⏳'} ${m.titulo} (+${m.pontos} Legado)</div>
      <div class="milestone-desc">${m.desc}</div>
    </div>`;
  });

  return h;
}

function pesquisarTech(techId){
  const t = TECH_TREE.find(x=>x.id===techId);
  if (!t || state.tecnologias[techId]) return;
  if (!t.req.every(r=>state.tecnologias[r])) return;
  if (state.pesquisaPD < t.custo) return;
  state.pesquisaPD -= t.custo;
  state.tecnologias[techId] = true;
  toast('🔬 Tecnologia desbloqueada: '+t.emoji+' '+t.nome);
  checkMarcos();
  renderAll();
}

function escolherRumo(rumo){
  if (state.rumoColonia) return;
  state.rumoColonia = rumo;
  const nomes = {tecnologia:'Tecnologia', natureza:'Natureza', militar:'Poder Militar'};
  toast('🏛️ O Conselho decidiu: o Vale seguirá o caminho da '+nomes[rumo]+'!');
  renderSidepanel();
}

function checkMarcos(){
  MILESTONES.forEach(m=>{
    if (!state.marcosCompletos.includes(m.id) && m.check(state)){
      state.marcosCompletos.push(m.id);
      grantReward(m.recompensa);
      toast('🏆 Marco histórico: '+m.titulo+' (+'+m.pontos+' Legado)');
    }
  });
}

// Chance de novo colono especialista chegar (via Torre de Rádio)
function tentarNovoColono(){
  if (!state.tecnologias['tech_radio']) return;
  if (state.colonosEspecialistas.length >= COLONO_TIPOS.length) return;
  const chance = 0.06;
  if (Math.random() < chance){
    const disponiveis = COLONO_TIPOS.filter(t=>!state.colonosEspecialistas.some(c=>c.tipo===t.tipo));
    if (!disponiveis.length) return;
    const tipo = disponiveis[Math.floor(Math.random()*disponiveis.length)];
    const nome = gerarNomeColono();
    state.colonosEspecialistas.push({tipo:tipo.tipo, nome});
    if (tipo.tipo==='agricultor') ganharXP('agricultura', xpParaNivel(1));
    toast('👤 '+nome+' (' +tipo.nome+ ') chegou ao Vale, atraído pelo sinal de rádio!');
  }
}
function gerarNomeColono(){
  const nomes=['Wren','Cassidy','Tobias','Nadia','Silas','Yara','Orin','Vesper','Kael','Mira'];
  return nomes[Math.floor(Math.random()*nomes.length)];
}


function bindSidepanelEvents(){
  document.querySelectorAll('.npc-card').forEach(el=>{
    el.addEventListener('click', ()=>openDialogue(el.dataset.npc));
  });
  document.querySelectorAll('[data-buy]').forEach(btn=>{
    btn.addEventListener('click',()=>buyItem(btn.dataset.buy));
  });
  document.querySelectorAll('[data-sell]').forEach(btn=>{
    btn.addEventListener('click',()=>sellCrop(btn.dataset.sell, btn.dataset.qual));
  });
  document.querySelectorAll('[data-sellanimal]').forEach(btn=>{
    btn.addEventListener('click',()=>venderProdutoAnimal(btn.dataset.sellanimal));
  });
  document.querySelectorAll('[data-feed]').forEach(btn=>{
    btn.addEventListener('click',()=>feedAnimal(btn.dataset.feed));
  });
  document.querySelectorAll('[data-collect]').forEach(btn=>{
    btn.addEventListener('click',()=>collectAnimalProduct(btn.dataset.collect));
  });
  document.querySelectorAll('[data-upgrade]').forEach(btn=>{
    btn.addEventListener('click',()=>upgradeBuilding(btn.dataset.upgrade));
  });
  document.querySelectorAll('[data-tech]').forEach(btn=>{
    btn.addEventListener('click',()=>pesquisarTech(btn.dataset.tech));
  });
  document.querySelectorAll('[data-rumo]').forEach(btn=>{
    btn.addEventListener('click',()=>escolherRumo(btn.dataset.rumo));
  });
  const sleepBtn = document.getElementById('sleep-btn');
  if (sleepBtn) sleepBtn.addEventListener('click', advanceDay);
  const radBtn = document.getElementById('radaway-btn');
  if (radBtn) radBtn.addEventListener('click', useRadAway);
}

// SHOP ACTIONS
// ─────────────────────────────────────────────────────────────
function buyItem(id){
  const item = SHOP_ITEMS.find(i=>i.id===id);
  if (!item || state.caps < item.preco) return;
  state.caps -= item.preco;
  if (item.tipo==='semente'){
    state.inventario.sementes[item.cropKey] = (state.inventario.sementes[item.cropKey]||0)+1;
    toast('Comprou '+item.nome);
  } else if (item.tipo==='consumivel'){
    if (!state.inventario.consumiveis) state.inventario.consumiveis={};
    state.inventario.consumiveis[item.id] = (state.inventario.consumiveis[item.id]||0)+1;
    toast('Comprou '+item.nome);
  } else if (item.tipo==='expansao'){
    const locked = state.plots.find(p=>p.locked);
    if (locked){ locked.locked=false; state.parcelasDesbloqueadas++; toast('Nova parcela desbloqueada! 🟫'); updateQuestProgress('expandir', state.parcelasDesbloqueadas-UNLOCKED_START); }
    else { state.caps += item.preco; toast('Todas as parcelas já desbloqueadas.'); }
  } else if (item.tipo==='fertilizante'){
    state.inventario.fertilizante = (state.inventario.fertilizante||0)+1;
    toast('Comprou Fertilizante Mutagênico 🧪');
  } else if (item.tipo==='racao'){
    state.inventario.racao = (state.inventario.racao||0)+1;
    toast('Comprou Ração Animal 🌾');
  } else if (item.tipo==='animal'){
    const cap = CELEIRO_CAPACIDADE[state.buildings.celeiro-1];
    if (state.animais.length >= cap){
      state.caps += item.preco;
      toast('Celeiro sem espaço! Evolua o Celeiro no SETOR.', true);
    } else {
      state.animais.push({ id:'a'+Date.now()+Math.random(), tipo:item.animalKey, nome:gerarNomeAnimal(item.animalKey), fome:100, felicidade:80, diasDesdeProducao:0, pronto:false });
      toast('Novo animal no curral! '+ANIMAL_TYPES[item.animalKey].emoji);
    }
  }
  renderTopbar(); renderSidepanel(); renderFarm(); renderHotbar();
}

function gerarNomeAnimal(tipo){
  const nomes = {galinha:['Pena','Cluck','Atomic','Glow'], vaca:['Mu','Brahma','Verde','Cinder'], cabra:['Duo','Chifre','Mutante','Bico']};
  const arr = nomes[tipo]||['Bicho'];
  return arr[Math.floor(Math.random()*arr.length)]+'-'+Math.floor(Math.random()*99);
}

function sellCrop(key, qualidade){
  const c = CROPS[key];
  let qty, label=c.nome, multiplicador=1;
  if (qualidade){
    qty = state.inventario.qualidades?.[key]?.[qualidade];
    if (!qty) return;
    state.inventario.qualidades[key][qualidade]--;
    if (state.inventario.qualidades[key][qualidade]<=0) delete state.inventario.qualidades[key][qualidade];
    multiplicador = qualidade==='Mutante' ? 2.5 : 1.5;
    label += ' ★'+qualidade;
  } else {
    const totalQual = Object.values(state.inventario.qualidades?.[key]||{}).reduce((a,b)=>a+b,0);
    qty = (state.inventario.colheitas[key]||0) - totalQual;
    if (qty<=0) return;
  }
  state.inventario.colheitas[key]--;
  if (state.inventario.colheitas[key]<=0) delete state.inventario.colheitas[key];
  let bonusVenda = 1;
  if (state.tecnologias['tech_mercado']) bonusVenda += 0.15;
  if (state.rumoColonia==='natureza') bonusVenda += 0.10;
  const valor = Math.round(c.venda*multiplicador*bonusVenda);
  state.caps += valor;
  state.tampinhasGanhas += valor;
  toast('Vendido '+label+' por '+valor+' 🧢');
  if (state.tecnologias['tech_reciclagem'] && Math.random()<0.3){
    state.inventario.racao = (state.inventario.racao||0)+1;
    toast('♻️ Reciclagem gerou +1 Ração Animal');
  }
  updateQuestProgress('tampinhas', state.tampinhasGanhas);
  renderTopbar(); renderSidepanel();
}

function venderProdutoAnimal(key){
  const info = PRODUTO_ANIMAL_INFO[key];
  const qty = state.produtosAnimais[key];
  if (!qty) return;
  state.produtosAnimais[key]--;
  if (state.produtosAnimais[key]<=0) delete state.produtosAnimais[key];
  state.caps += info.venda;
  state.tampinhasGanhas += info.venda;
  ganharXP('social', 2);
  toast('Vendido '+info.emoji+' '+info.nome+' por '+info.venda+' 🧢');
  updateQuestProgress('tampinhas', state.tampinhasGanhas);
  renderTopbar(); renderSidepanel();
}

const PRODUTO_ANIMAL_INFO = {
  galinha: {nome:'Ovo Brilhante', emoji:'🥚', venda:35},
  vaca: {nome:'Leite Radioso', emoji:'🥛', venda:90},
  cabra: {nome:'Lã Mutante', emoji:'🧶', venda:60},
};

function useRadAway(){
  if (!state.inventario.consumiveis || !state.inventario.consumiveis.rad_x) return;
  state.inventario.consumiveis.rad_x--;
  state.radiacao = Math.max(0, state.radiacao-40);
  toast('Radiação reduzida 💊');
  renderTopbar(); renderSidepanel();
}

// ─────────────────────────────────────────────────────────────
// DIALOGUE
// ─────────────────────────────────────────────────────────────
function openDialogue(npcId){
  const npc = state.npcs.find(n=>n.id===npcId);
  const box = document.getElementById('dialogue-box');
  const tier = getColonyTier();
  const tierFalas = {
    0: ['Olha esse lugar... ainda mal dá pra chamar de acampamento.', 'Um dia isso aqui vai ser algo de verdade. Eu acredito.'],
    1: ['O Vale está crescendo. Sinto isso no ar.', 'Já não é mais só sobrevivência. Estamos construindo algo.'],
    2: ['Vila do Vale 111... tem até nome agora! Quem diria.', 'As ruas estão mais movimentadas a cada semana.'],
    3: ['Painéis solares, drones, muralhas... isso aqui virou uma cidade de verdade.', 'Às vezes esqueço que vivemos num mundo pós-nuclear, de tão bem que estamos.'],
    4: ['O Vale 111 se tornou um farol. Gente de longe vem só para ver com os próprios olhos.', 'Reconstruímos uma civilização aqui. Você fez parte disso.'],
  };
  let fala;
  if (Math.random()<0.25){
    const idx = COLONY_TIERS.indexOf(tier);
    const opts = tierFalas[idx];
    fala = opts[Math.floor(Math.random()*opts.length)];
  } else {
    fala = npc.falas[Math.floor(Math.random()*npc.falas.length)];
  }

  if (!state.conversadosHoje.has(npcId)){
    state.conversadosHoje.add(npcId);
    state.npcsConversados.add(npcId);
    npc.hearts = Math.min(5, npc.hearts+ (Math.random()<0.5?1:0));
    updateQuestProgress('conversar', state.npcsConversados.size);
  }

  box.innerHTML = `
    <div class="dlg-name">${npc.emoji} ${npc.nome}</div>
    <div class="dlg-text">${fala}</div>
    <div class="dlg-choices">
      <button class="dlg-choice" id="dlg-close">[Encerrar conversa]</button>
    </div>
  `;
  box.classList.add('show');
  document.getElementById('dlg-close').addEventListener('click',()=>{
    box.classList.remove('show');
    renderSidepanel();
  });
}

// ─────────────────────────────────────────────────────────────
// TIME / DAY ADVANCE
// ─────────────────────────────────────────────────────────────
function advanceDay(){
  // grow crops
  state.plots.forEach(p=>{
    if (p.crop && !p.ready){
      const irrigado = state.tecnologias['tech_irrigador'] && p.tilled;
      if (p.watered || irrigado){
        p.growth += p.fertilizado ? 2 : 1;
        const c = CROPS[p.crop];
        if (p.growth>=c.dias) p.ready=true;
      }
      p.watered=false;
    }
  });

  // Drone agrícola: colhe 1 cultivo maduro automaticamente
  if (state.tecnologias['tech_drone_agricola']){
    const pronto = state.plots.find(p=>p.crop && p.ready);
    if (pronto){
      const c = CROPS[pronto.crop];
      state.inventario.colheitas[pronto.crop] = (state.inventario.colheitas[pronto.crop]||0)+1;
      state.colheitasFeitas++;
      ganharXP('agricultura', 4);
      updateQuestProgress('colher', state.colheitasFeitas);
      pronto.crop=null; pronto.growth=0; pronto.ready=false; pronto.watered=false;
      toast('🛰️ Drone colheu automaticamente: '+c.emoji+' '+c.nome);
    }
  }

  // animals: hunger decay, happiness, production
  state.animais.forEach(a=>{
    const t = ANIMAL_TYPES[a.tipo];
    a.fome = Math.max(0, a.fome-30);
    if (a.fome<=0) a.felicidade = Math.max(0, a.felicidade-15);
    else a.felicidade = Math.min(100, a.felicidade+2);
    if (a.fome>0){
      a.diasDesdeProducao++;
      if (a.diasDesdeProducao>=t.diasProducao){ a.pronto = true; }
    }
  });

  // Coletor automático do curral
  if (state.tecnologias['tech_coletor_automatico']){
    state.animais.forEach(a=>{
      if (a.pronto){
        state.produtosAnimais[a.tipo] = (state.produtosAnimais[a.tipo]||0)+1;
        a.pronto=false; a.diasDesdeProducao=0;
      }
    });
  }

  // Pontos de Pesquisa diários (laboratório + cientistas + escolha de tecnologia)
  let pdGanho = state.buildings.laboratorio - 1; // nível 2+ gera PD
  state.colonosEspecialistas.forEach(c=>{ if (c.tipo==='cientista') pdGanho += 1; });
  if (state.rumoColonia==='tecnologia') pdGanho += 1;
  if (pdGanho>0){ state.pesquisaPD += pdGanho; }

  state.dia++;
  state.hora=6;
  state.energia = state.energiaMax;
  state.conversadosHoje.clear();

  // season change every 7 days
  if ((state.dia-1)%7===0){
    state.estacaoIdx = (state.estacaoIdx+1)%4;
    toast('🌗 Nova estação: '+SEASONS[state.estacaoIdx]);
  }

  // random radiation storm
  let radReducao = BUILDINGS.laboratorio.bonusRadReducao[state.buildings.laboratorio-1];
  if (state.tecnologias['tech_purificador']) radReducao = Math.max(radReducao, 0.5);
  if (state.tempestadeAtiva){
    state.tempestadeAtiva=false;
    state.tempestadeSobrevivida=true;
    updateQuestProgress('tempestade',1);
    toast('☢️ A tempestade passou.');
  } else if (Math.random()<0.18*(1-radReducao)){
    state.tempestadeAtiva=true;
    let aumento = 25*(1-radReducao);
    if (state.rumoColonia==='militar') aumento = 0;
    state.radiacao = Math.min(100, state.radiacao + aumento);
    toast('⚠️ Tempestade radioativa se aproxima! Fique no abrigo.', true);
  } else {
    state.radiacao = Math.max(0, state.radiacao - 5 - (radReducao*5));
  }
  if (state.tecnologias['tech_purificador']) state.radiacao = Math.min(state.radiacao, 30);

  // Novo colono especialista via rádio
  tentarNovoColono();

  // Track peak caps + check milestones
  if (state.caps > state.maiorCapsAcumulado) state.maiorCapsAcumulado = state.caps;
  checkMarcos();

  renderAll();
}
